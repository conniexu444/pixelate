<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixelate</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" />

  <style>
    :root {
      --pico-background-color:          #faf9f5;
      --pico-color:                     #141413;
      --pico-primary:                   #c6613f;
      --pico-primary-hover:             #d97757;
      --pico-primary-focus:             rgba(198, 97, 63, 0.22);
      --pico-primary-inverse:           #faf9f5;
      --pico-secondary:                 #3d3d3a;
      --pico-secondary-hover:           #141413;
      --pico-card-background-color:     #f0eee6;
      --pico-card-border-color:         #e8e6dc;
      --pico-border-color:              #e3dacc;
      --pico-muted-color:               #5e5d59;
      --pico-muted-border-color:        #e3dacc;
      --pico-form-element-background-color:  #faf9f5;
      --pico-form-element-border-color:      #e3dacc;
      --pico-form-element-focus-color:       #c6613f;
      --pico-form-element-placeholder-color: #b0aea5;
      --pico-border-radius:             0.5rem;
      --pico-font-family:               "Inter", "Arial", sans-serif;
      --pico-font-size:                 1rem;
      --pico-line-height:               1.6;
    }

    h1, h2, h3 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: #faf9f5;
      color: #141413;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-size: 2.6rem; margin-bottom: 6px; color: #141413; }
    .page-header p { color: #5e5d59; font-size: 0.95rem; margin: 0; }

    .drop-zone {
      width: 100%;
      max-width: 560px;
      border: 2px dashed #e3dacc;
      border-radius: 12px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #f0eee6;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over { border-color: #c6613f; background: #ece8df; }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 2.2rem; margin-bottom: 14px; line-height: 1; }
    .drop-label { font-size: 0.95rem; color: #5e5d59; margin: 0; }
    .drop-label strong { color: #c6613f; font-weight: 600; }
    .drop-hint { font-size: 0.8rem; color: #b0aea5; margin: 6px 0 0; }

    .controls {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .controls label {
      white-space: nowrap;
      font-size: 0.82rem;
      font-weight: 500;
      color: #5e5d59;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      margin: 0;
    }

    .controls input[type="range"] {
      flex: 1;
      accent-color: #c6613f;
      cursor: pointer;
      height: 4px;
      margin: 0;
    }

    .pixel-value {
      font-size: 0.82rem;
      font-weight: 600;
      color: #141413;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .actions {
      width: 100%;
      max-width: 560px;
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      font-family: "Inter", Arial, sans-serif;
      letter-spacing: 0.01em;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-primary { background: #c6613f; color: #faf9f5; }
    .btn-primary:hover:not(:disabled) { background: #d97757; }

    .btn-secondary {
      background: transparent;
      color: #3d3d3a;
      border: 1.5px solid #e3dacc;
    }
    .btn-secondary:hover:not(:disabled) { background: #f0eee6; border-color: #b0aea5; }

    .canvas-section {
      width: 100%;
      max-width: 860px;
      margin-top: 0;
      display: none;
    }

    .canvas-section.visible { display: block; }

    .canvas-divider {
      width: 100%;
      border: none;
      border-top: 1px solid #e8e6dc;
      margin: 36px 0;
    }

    .canvas-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .canvas-wrap { flex: 1; min-width: 260px; max-width: 420px; }

    .canvas-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #b0aea5;
      margin-bottom: 10px;
    }

    canvas {
      width: 100%;
      border-radius: 10px;
      display: block;
      border: 1px solid #e8e6dc;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<main>

  <header class="page-header">
    <h1>Pixelate</h1>
    <p>Transform any image into pixel art</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" />
    <div class="drop-icon">&#128247;</div>
    <p class="drop-label"><strong>Click to upload</strong> or drag &amp; drop</p>
    <p class="drop-hint">PNG &middot; JPG &middot; WebP &middot; GIF</p>
  </div>

  <div class="controls">
    <label for="pixelSlider">Pixel size</label>
    <input type="range" id="pixelSlider" min="2" max="64" value="12" step="1" />
    <span class="pixel-value" id="pixelValue">12px</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="pixelateBtn" disabled>Pixelate</button>
    <button class="btn btn-secondary" id="downloadBtn" disabled>Download</button>
  </div>

  <div class="canvas-section" id="canvasSection">
    <hr class="canvas-divider" />
    <div class="canvas-row">
      <div class="canvas-wrap">
        <div class="canvas-label">Original</div>
        <canvas id="sourceCanvas"></canvas>
      </div>
      <div class="canvas-wrap">
        <div class="canvas-label">Pixel art</div>
        <canvas id="outputCanvas"></canvas>
      </div>
    </div>
  </div>

</main>

<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
  const fileInput     = document.getElementById('fileInput');
  const dropZone      = document.getElementById('dropZone');
  const pixelSlider   = document.getElementById('pixelSlider');
  const pixelValue    = document.getElementById('pixelValue');
  const pixelateBtn   = document.getElementById('pixelateBtn');
  const downloadBtn   = document.getElementById('downloadBtn');
  const canvasSection = document.getElementById('canvasSection');
  const sourceCanvas  = document.getElementById('sourceCanvas');
  const outputCanvas  = document.getElementById('outputCanvas');
  const hiddenCanvas  = document.getElementById('hiddenCanvas');

  let loadedImage = null;

  pixelSlider.addEventListener('input', () => {
    pixelValue.textContent = pixelSlider.value + 'px';
    if (loadedImage) pixelate();
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
  });

  function loadImage(file) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      loadedImage = img;
      sourceCanvas.width  = img.naturalWidth;
      sourceCanvas.height = img.naturalHeight;
      sourceCanvas.getContext('2d').drawImage(img, 0, 0);
      pixelateBtn.disabled = false;
      downloadBtn.disabled = true;
      canvasSection.classList.add('visible');
      pixelate();
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  pixelateBtn.addEventListener('click', pixelate);

  function pixelate() {
    if (!loadedImage) return;
    const blockSize = parseInt(pixelSlider.value, 10);
    const W = loadedImage.naturalWidth;
    const H = loadedImage.naturalHeight;

    hiddenCanvas.width  = W;
    hiddenCanvas.height = H;
    const hCtx = hiddenCanvas.getContext('2d');
    hCtx.drawImage(loadedImage, 0, 0);

    outputCanvas.width  = W;
    outputCanvas.height = H;
    const oCtx = outputCanvas.getContext('2d');

    for (let y = 0; y < H; y += blockSize) {
      for (let x = 0; x < W; x += blockSize) {
        const bw = Math.min(blockSize, W - x);
        const bh = Math.min(blockSize, H - y);
        const data = hCtx.getImageData(x, y, bw, bh).data;
        let r = 0, g = 0, b = 0, a = 0;
        const n = bw * bh;
        for (let i = 0; i < data.length; i += 4) {
          r += data[i]; g += data[i+1]; b += data[i+2]; a += data[i+3];
        }
        oCtx.fillStyle = `rgba(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)},${Math.round(a/n)/255})`;
        oCtx.fillRect(x, y, bw, bh);
      }
    }

    downloadBtn.disabled = false;
  }

  downloadBtn.addEventListener('click', () => {
    outputCanvas.toBlob(blob => {
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href     = url;
      link.download = 'pixel-art.png';
      link.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
</script>
</body>
</html>
